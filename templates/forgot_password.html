{% extends 'base.html' %}

{% block content %}
    <div class="form-container">
        <h2>Forgot Password</h2>
        <form method="POST">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <button type="submit">Reset Password</button>
        </form>
        <p style="margin-top: 15px; text-align: center;">Remember your password? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
{% endblock %}
