{% extends 'base.html' %}

{% block content %}
    <div class="form-container">
        <h2>Login</h2>
        <form method="POST">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <p style="margin-top: 10px; text-align: center;"><a href="{{ url_for('forgot_password') }}">Forgot password?</a></p>
        <p style="margin-top: 10px; text-align: center;">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </div>
{% endblock %}
